function julianEaster(year) {
  const a = year % 4, b = year % 7, c = year % 19;
  const d = (19 * c + 15) % 30;
  const e = (2 * a + 4 * b - d + 34) % 7;
  const month = Math.floor((d + e + 114) / 31);
  const day = ((d + e + 114) % 31) + 1;
  return { month, day };
}

function gregorianEaster(year) {
  const a = year % 19, b = Math.floor(year / 100), c = year % 100;
  const d = Math.floor(b / 4), e = b % 4;
  const f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return { month, day };
}

function getEasterDate(year) {
  const easter = year <= 1752 ? julianEaster(year) : gregorianEaster(year);
  return new Date(year, easter.month - 1, easter.day);
}

function addDays(date, days) {
  const result = new Date(date);
  result.setDate(result.getDate() + days);
  return result;
}

function daysInMonth(year, month) { return new Date(year, month, 0).getDate(); }
function dayOfWeek(year, month, day) { return new Date(year, month - 1, day).getDay(); }

}

function getNextWeekday(fromDate, targetDay) {
  const d = new Date(fromDate);
  const diff = (targetDay - d.getDay() + 7) % 7;
  d.setDate(d.getDate() + (diff === 0 ? 7 : diff));
  return d;
}

  rdD(addDays(easter,36),"Five weeks after Easter","Return day");
  rdD(addDays(easter,40),"Morrow of the Ascension","Return day; final return of Easter term");
  const trin = addDays(easter,56);
  rdD(addDays(trin,8),"Octaves of Trinity","Return day; Trinity term");

  rd(7,8,"Quindene of St John the Baptist","Return day [8-14 July]");
  const emb = (base, label) => {
    const w = getNextWeekday(base, 3);
    rd(w.getMonth()+1,w.getDate(),"Ember Wednesday ("+label+")","Quatuor tempora");
    const f = addDays(w,2); rd(f.getMonth()+1,f.getDate(),"Ember Friday ("+label+")",null);
    const s = addDays(w,3); rd(s.getMonth()+1,s.getDate(),"Ember Saturday ("+label+")",null);
  };
  emb(addDays(easter,-42),"Lent"); emb(addDays(easter,49),"Pentecost");
  emb(new Date(year,8,14),"September"); emb(new Date(year,11,13),"Advent");
  return dates;
}

function regnalForDate(y, m, d) {
  const date = new Date(y, m - 1, d);
  const parts = [];
  for (let i = 0; i < REIGNS.length; i++) {
    const r = REIGNS[i];
    const acc = new Date(r[0], r[1]-1, r[2]);
    const end = new Date(r[3], r[4]-1, r[5]);
    if (date >= acc && date <= end) {
      const anniv = new Date(y, r[1]-1, r[2]);
      const ry = date >= anniv ? y - r[0] + 1 : y - r[0];
      if (ry >= 1) parts.push(ry + " " + r[6]);
    }
  }
  return parts.join(" / ");
}

function findTransDay(y, m) {
  for (let i = 0; i < REIGNS.length; i++) {
    const r = REIGNS[i];
    if (r[1] === m && r[2] > 1) {
      const acc = new Date(r[0], r[1]-1, r[2]);
      const end = new Date(r[3], r[4]-1, r[5]);
      const before = new Date(y, m - 1, r[2] - 1);
      if (before >= acc && before <= end) return r[2];
    }
  }
  return 0;
}

function getEventsForYear(year) {
  const easter = getEasterDate(year);
  const events = {};
  const add = (month, day, evt) => { const k=month+"-"+day; if(!events[k])events[k]=[]; events[k].push(evt); };
  FIXED_FEASTS.forEach(f => add(f.month, f.day, {name:f.name,cat:f.cat,note:f.note}));
  MOVEABLE_OFFSETS.forEach(m => { const d=addDays(easter,m.offset); add(d.getMonth()+1,d.getDate(),{name:m.name,cat:m.cat,note:m.note}); });
  getLegalDates(year, easter).forEach(l => add(l.month,l.day,{name:l.name,cat:l.cat,note:l.note}));
  return { events: events, easterDate: easter };
}

function Calendarium() {
  const [year, setYear] = useState(1400);
  const [month, setMonth] = useState(1);
  const [calMode, setCalMode] = useState("ecclesiastical");
  const [selectedDay, setSelectedDay] = useState(null);
  const [yearInput, setYearInput] = useState("1400");
  const [viewMode, setViewMode] = useState("month");
  const [searchTerm, setSearchTerm] = useState("");
  const [searchResults, setSearchResults] = useState(null);

  const { events, easterDate } = useMemo(() => getEventsForYear(year), [year]);
  const numDays = daysInMonth(year, month);
  const firstDow = dayOfWeek(year, month, 1);
  const regnalText = useMemo(() => regnalForDate(year, month, 1), [year, month]);
  const regnalTrans = useMemo(() => findTransDay(year, month), [year, month]);
  const selectedRegnalText = useMemo(() => selectedDay === null ? "" : regnalForDate(year, month, selectedDay), [year, month, selectedDay]);

  const getEventsForDay = useCallback((d) => {
    const key = month + "-" + d;
    const dayEvents = events[key] || [];
    if (calMode === "ecclesiastical") return dayEvents.filter(e => e.cat !== "legal");
    if (calMode === "legal") return dayEvents.filter(e => e.cat === "legal");
    return dayEvents;
  }, [month, events, calMode]);

  const getEventsForMonthDay = useCallback((m, d) => {
    const key = m + "-" + d;
    const dayEvents = events[key] || [];
    if (calMode === "ecclesiastical") return dayEvents.filter(e => e.cat !== "legal");
    if (calMode === "legal") return dayEvents.filter(e => e.cat === "legal");
    return dayEvents;
  }, [events, calMode]);

  function navigateMonth(dir) {
    let nm = month + dir, ny = year;
    if (nm < 1) { nm = 12; ny--; }
    if (nm > 12) { nm = 1; ny++; }
    setMonth(nm); setYear(ny); setYearInput(String(ny)); setSelectedDay(null);
  }

  function handleYearSubmit() {
    const y = parseInt(yearInput);
    if (y && y >= 1 && y <= 2100) { setYear(y); setSelectedDay(null); }
  }

  function handleSearch(term) {
    setSearchTerm(term);
    if (term.length < 2) { setSearchResults(null); return; }
    const lower = term.toLowerCase();
    const results = [];
    if (calMode === "ecclesiastical") {
      FIXED_FEASTS.forEach(f => {
        if (f.name.toLowerCase().includes(lower) || (f.note && f.note.toLowerCase().includes(lower)))
          results.push({month:f.month,day:f.day,name:f.name,cat:f.cat,dateStr:f.day+" "+MONTH_NAMES[f.month-1]});
      });
      MOVEABLE_OFFSETS.forEach(m => {
        if (m.name.toLowerCase().includes(lower) || (m.note && m.note.toLowerCase().includes(lower))) {
          const d = addDays(easterDate, m.offset);
          results.push({offset:m.offset,name:m.name,cat:m.cat,dateStr:d.getDate()+" "+MONTH_NAMES[d.getMonth()]+" "+year});
        }
      });
    } else {
      getLegalDates(year, easterDate).forEach(l => {
        if (l.name.toLowerCase().includes(lower) || (l.note && l.note.toLowerCase().includes(lower)))
          results.push({month:l.month,day:l.day,name:l.name,cat:l.cat,dateStr:l.day+" "+MONTH_NAMES[l.month-1]+" "+year});
      });
    }
    setSearchResults(results.slice(0, 12));
  }

  const weeks = [];
  let cw = new Array(firstDow).fill(null);
  for (let d = 1; d <= numDays; d++) { cw.push(d); if (cw.length === 7) { weeks.push(cw); cw = []; } }
  if (cw.length > 0) { while (cw.length < 7) cw.push(null); weeks.push(cw); }

  const selectedEvents = selectedDay ? getEventsForDay(selectedDay) : [];
  const eM = easterDate.getMonth()+1, eD = easterDate.getDate();
  const calType = year <= 1752 ? "Julian" : "Gregorian";
  const mec = useMemo(() => { let c=0; for(let d=1;d<=numDays;d++) c+=getEventsForDay(d).length; return c; }, [numDays, getEventsForDay]);

  return (
    <div style={{minHeight:"100vh",background:"#f5ead0",fontFamily:"'Cormorant Garamond',Georgia,serif",color:"#3a2e1e"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');
        *{box-sizing:border-box}::selection{background:#8b6914;color:#fff}
        .tk-nav{display:flex;justify-content:center;gap:0;background:#ede0c4;border-bottom:1px solid #d4c5a0;padding:0;flex-wrap:wrap}
        .tk-nav a{display:block;padding:10px 20px;font-family:'Crimson Pro',Georgia,serif;font-size:13px;color:#7a6a4a;text-decoration:none;letter-spacing:.04em;transition:all .2s;border-bottom:2px solid transparent}
        .tk-nav a:hover{color:#3a2e1e;background:rgba(122,92,20,.06)}
        .tk-nav a.active{color:#2a1e0e;border-bottom-color:#7a5c14;font-weight:600}
        .cn{background:none;border:1px solid #c4b48a;color:#7a5c14;width:40px;height:40px;font-size:20px;cursor:pointer;border-radius:3px;transition:all .2s;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif}
        .cn:hover{background:rgba(122,92,20,.1);border-color:#7a5c14}
        .yi{background:#fff8eb;border:1px solid #c4b48a;color:#3a2e1e;padding:6px 10px;font-family:'Crimson Pro',Georgia,serif;font-size:18px;text-align:center;width:80px;border-radius:3px;outline:none}
        .yi:focus{border-color:#7a5c14}
        .si{background:#fff8eb;border:1px solid #c4b48a;color:#3a2e1e;padding:8px 14px;font-family:'Crimson Pro',Georgia,serif;font-size:15px;border-radius:3px;outline:none;width:100%}
        .si:focus{border-color:#7a5c14}.si::placeholder{color:#a0906a}
        .cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
        .ch{text-align:center;padding:8px 4px;font-size:12px;text-transform:uppercase;letter-spacing:.15em;color:#8a7a5a;font-weight:600}
        .cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:6px 2px 2px;border-radius:3px;cursor:pointer;transition:all .15s;min-height:48px;border:1px solid transparent}
        .cd:hover{background:rgba(122,92,20,.08);border-color:#c4b48a}.cd.sel{background:rgba(122,92,20,.15);border-color:#7a5c14}.cd.he{background:rgba(122,92,20,.05)}
        .cd.em{cursor:default}.cd.em:hover{background:transparent;border-color:transparent}
        .dn{font-family:'Crimson Pro',Georgia,serif;font-size:16px;color:#5a4a30;line-height:1}
        .cd.sel .dn,.cd:hover .dn{color:#3a2e1e}.cd.su .dn{color:#9a6a10}.cd.acc{border-bottom:2px solid #7a5c14}
        .dd{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap;justify-content:center}.dt{width:5px;height:5px;border-radius:50%}
        .ec{padding:12px 16px;border-left:3px solid;background:linear-gradient(135deg,#faf3e3,#f0e6cc);border-radius:0 3px 3px 0;margin-bottom:8px;animation:fi .3s ease}
        .li{display:flex;align-items:center;gap:8px;font-family:'Crimson Pro',Georgia,serif;font-size:14px;color:#7a6a4a}
        .ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .ib{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:12px 16px;background:#ede0c4;border:1px solid #d4c5a0;border-radius:3px;margin-bottom:16px}
        .sr{padding:8px 14px;border-bottom:1px solid #e8dbc0;cursor:pointer;transition:background .15s}.sr:hover{background:rgba(122,92,20,.08)}
        .mt{display:flex;gap:0;margin-bottom:20px;justify-content:center}
        .mt-btn{padding:10px 28px;font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;font-weight:600;letter-spacing:.06em;border:1px solid #c4b48a;cursor:pointer;transition:all .3s;background:transparent;color:#7a6a4a}
        .mt-btn:first-child{border-radius:3px 0 0 3px}.mt-btn:last-child{border-radius:0 3px 3px 0;border-left:none}
        .mt-btn.mt-ecc{background:#9a6a10;color:#fff;border-color:#9a6a10}
        .mt-btn.mt-leg{background:#6a5ea0;color:#fff;border-color:#6a5ea0}
        .mt-btn:not(.mt-ecc):not(.mt-leg):hover{background:rgba(122,92,20,.1);color:#3a2e1e}
        .yg{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
        @media(max-width:700px){.yg{grid-template-columns:repeat(2,1fr)}}
        .ym{background:#faf3e3;border:1px solid #d4c5a0;border-radius:3px;padding:10px;cursor:pointer;transition:all .2s}
        .ym:hover{border-color:#b0a070;background:#fff8eb}
        .ym-title{font-size:13px;font-weight:600;color:#7a5c14;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;text-align:center}
        .ym-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
        .ym-dh{font-size:8px;text-align:center;color:#a0906a;padding:1px 0}
        .ym-d{font-size:9px;text-align:center;color:#8a7a5a;padding:2px 0;border-radius:2px;line-height:1.4}
        .ym-d.ym-he{color:#3a2e1e;background:rgba(122,92,20,.08)}
        .ym-d.ym-su{color:#9a6a10}
        .ym-dots{display:flex;gap:1px;justify-content:center;margin-top:1px}
        .ym-dot{width:3px;height:3px;border-radius:50%}
        .vt{display:flex}.vt-btn{padding:6px 16px;font-family:'Cormorant Garamond',Georgia,serif;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border:1px solid #c4b48a;cursor:pointer;background:transparent;color:#7a6a4a}
        .vt-btn:first-child{border-radius:3px 0 0 3px}.vt-btn:last-child{border-radius:0 3px 3px 0;border-left:none}
        .vt-btn.vac{background:#7a5c14;color:#fff;border-color:#7a5c14}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:500px){.cd{min-height:38px;padding:4px 1px 1px}.dn{font-size:13px}}
      `}</style>

      <nav className="tk-nav">
        <a href="anno-regni.html">Anno Regni</a>
        <a href="calendarium.html" className="active">Calendarium</a>
        <a href="carta-maneriorum.html">Carta Maneriorum</a>
        <a href="locus-placenames.html">Locus</a>
      </nav>

      <div style={{borderBottom:"1px solid #d4c5a0",padding:"40px 24px 32px",textAlign:"center",background:"linear-gradient(180deg,#ede0c4,#f5ead0)"}}>
        <div style={{fontSize:"11px",textTransform:"uppercase",letterSpacing:".35em",color:"#7a5c14",marginBottom:"12px",fontWeight:600}}>Medieval Calendar</div>
        <h1 style={{fontSize:"clamp(28px,5vw,42px)",fontWeight:300,color:"#2a1e0e",margin:"0 0 8px",letterSpacing:".02em",lineHeight:1.2}}>Calendarium</h1>
        <p style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"16px",color:"#7a6a4a",margin:0,fontStyle:"italic"}}>{calMode === "ecclesiastical" ? "Feasts, fasts, and saints' days of the English medieval year" : "Law terms, return days, and quarter days"}</p>
        <p style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"12px",color:"#9a8a6a",margin:"6px 0 0",fontStyle:"italic"}}>Sourced from Cheney & Jones, <em>Handbook of Dates</em> (Cambridge, 2000)</p>
      </div>

      <div style={{maxWidth:680,margin:"0 auto",padding:"28px 16px 60px"}}>
        <div style={{marginBottom:20,position:"relative"}}>
          <input className="si" type="text" placeholder={calMode==="ecclesiastical"?"Search feasts...":"Search legal dates..."} value={searchTerm} onChange={e=>handleSearch(e.target.value)} />
          {searchResults && searchResults.length > 0 && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:10,background:"#fff8eb",border:"1px solid #c4b48a",borderTop:"none",borderRadius:"0 0 3px 3px",maxHeight:300,overflowY:"auto"}}>
              {searchResults.map((r,i) => (
                <div key={i} className="sr" onClick={() => {
                  if(r.month){setMonth(r.month);setSelectedDay(r.day)}
                  else{const d=addDays(easterDate,r.offset);setMonth(d.getMonth()+1);setSelectedDay(d.getDate())}
                  setSearchTerm("");setSearchResults(null);setViewMode("month");
                }}>
                  <div style={{fontSize:"15px",color:"#3a2e1e"}}>{r.cat!=="legal"?expandAbbreviations(r.name):r.name}</div>
                  <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"13px",color:CATEGORIES[r.cat].color}}>{r.dateStr}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:20}}>
          {viewMode==="month" && <button className="cn" onClick={()=>navigateMonth(-1)}>&#8249;</button>}
          {viewMode==="year" && <button className="cn" onClick={()=>{setYear(y=>y-1);setYearInput(String(year-1))}}>&#8249;</button>}
          <div style={{textAlign:"center",minWidth:200}}>
            {viewMode==="month" && <div style={{fontSize:"clamp(20px,4vw,26px)",fontWeight:500,color:"#2a1e0e",letterSpacing:".04em"}}>{MONTH_NAMES[month-1]}</div>}
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:viewMode==="year"?0:4}}>
              <input className="yi" type="number" value={yearInput} onChange={e=>setYearInput(e.target.value)} onBlur={handleYearSubmit} onKeyDown={e=>{if(e.key==="Enter")handleYearSubmit()}} />
              <span style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"13px",color:"#9a8a6a"}}>{calType}</span>
            </div>
          </div>
          {viewMode==="month" && <button className="cn" onClick={()=>navigateMonth(1)}>&#8250;</button>}
          {viewMode==="year" && <button className="cn" onClick={()=>{setYear(y=>y+1);setYearInput(String(year+1))}}>&#8250;</button>}
        </div>

        <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
          <div className="vt">
            <button className={"vt-btn"+(viewMode==="month"?" vac":"")} onClick={()=>setViewMode("month")}>Month</button>
            <button className={"vt-btn"+(viewMode==="year"?" vac":"")} onClick={()=>{setViewMode("year");setSelectedDay(null)}}>Year</button>
          </div>
        </div>

        <div className="mt">
          <button className={"mt-btn"+(calMode==="ecclesiastical"?" mt-ecc":"")} onClick={()=>{setCalMode("ecclesiastical");setSelectedDay(null);setSearchTerm("");setSearchResults(null)}}>Ecclesiastical</button>
          <button className={"mt-btn"+(calMode==="legal"?" mt-leg":"")} onClick={()=>{setCalMode("legal");setSelectedDay(null);setSearchTerm("");setSearchResults(null)}}>Legal</button>
        </div>

        {viewMode==="month" && regnalText && (
          <div style={{padding:"10px 16px",background:"#ede0c4",border:"1px solid #d4c5a0",borderRadius:3,marginBottom:12,fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"14px",color:"#5a4a30"}}>
            <span style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontWeight:600,color:"#2a1e0e",fontSize:15}}>{regnalText}</span>
            {regnalTrans > 0 && <span style={{fontStyle:"italic",color:"#7a5c14",fontSize:13}}> (regnal new year: {regnalTrans} {MONTH_NAMES[month-1]})</span>}
          </div>
        )}

        <div className="ib">
          <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"14px",color:"#5a4a30"}}>
            Easter: <span style={{color:"#3a7a3a"}}>{eD} {MONTH_NAMES[eM-1]}</span>
            {viewMode==="month" && <span style={{color:"#9a8a6a",marginLeft:12}}>{mec} events</span>}
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            {calMode==="ecclesiastical" ? (
              <div style={{display:"flex",gap:10}}><div className="li"><span className="ld" style={{background:"#9a6a10"}}></span>Fixed</div><div className="li"><span className="ld" style={{background:"#3a7a3a"}}></span>Moveable</div></div>
            ) : (
              <div style={{display:"flex",gap:10}}><div className="li"><span className="ld" style={{background:"#6a5ea0"}}></span>Return days</div><div className="li"><span className="ld" style={{background:"#9a6a10"}}></span>Quarter days</div></div>
            )}
          </div>
        </div>

        {viewMode==="year" && (
          <div className="yg" style={{animation:"fi .3s ease"}}>
            {MONTH_NAMES.map((mName, mi) => {
              const mNum=mi+1, nd=daysInMonth(year,mNum), fd=dayOfWeek(year,mNum,1);
              const mWeeks=[]; let mCw=new Array(fd).fill(null);
              for(let d=1;d<=nd;d++){mCw.push(d);if(mCw.length===7){mWeeks.push(mCw);mCw=[]}}
              if(mCw.length>0){while(mCw.length<7)mCw.push(null);mWeeks.push(mCw)}
              return (
                <div key={mNum} className="ym" onClick={()=>{setMonth(mNum);setViewMode("month");setSelectedDay(null)}}>
                  <div className="ym-title">{mName.substring(0,3)}</div>
                  <div className="ym-grid">
                    {["S","M","T","W","T","F","S"].map((dl,di)=>(<div key={di} className="ym-dh">{dl}</div>))}
                    {mWeeks.flat().map((d,di) => {
                      if(d===null) return <div key={"e"+di} className="ym-d"></div>;
                      const de=getEventsForMonthDay(mNum,d),he=de.length>0,su=(di%7)===0;
                      const uc=[...new Set(de.map(e=>e.cat))];
                      return (
                        <div key={d} className={"ym-d"+(he?" ym-he":"")+(su?" ym-su":"")}>
                          {d}
                          {he && <div className="ym-dots">{uc.map(c=>(<span key={c} className="ym-dot" style={{background:CATEGORIES[c].color}}></span>))}</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {viewMode==="month" && (
          <div>
            <div className="cg">
              {DAY_LABELS.map(d=>(<div key={d} className="ch">{d}</div>))}
              {weeks.flat().map((d,i) => {
                if(d===null) return <div key={"e"+i} className="cd em"></div>;
                const de=getEventsForDay(d),he=de.length>0,is=selectedDay===d,su=(i%7)===0;
                const uc=[...new Set(de.map(e=>e.cat))];
                return (
                  <div key={d} className={"cd"+(he?" he":"")+(is?" sel":"")+(su?" su":"")+(regnalTrans===d?" acc":"")} onClick={()=>setSelectedDay(is?null:d)} >
                    <span className="dn">{d}</span>
                    {he && <div className="dd">{uc.map(c=>(<span key={c} className="dt" style={{background:CATEGORIES[c].color}}></span>))}</div>}
                  </div>
                );
              })}
            </div>

            {selectedDay!==null && (
              <div style={{marginTop:24,animation:"fi .3s ease"}}>
                <div style={{fontSize:"14px",textTransform:"uppercase",letterSpacing:".2em",color:"#7a5c14",marginBottom:4,fontWeight:600}}>{selectedDay} {MONTH_NAMES[month-1]} {year}</div>
                {selectedRegnalText && <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"13px",color:"#5a4a30",marginBottom:12}}>{selectedRegnalText}</div>}
                {selectedEvents.length>0 ? selectedEvents.map((evt,i) => (
                  <div key={i} className="ec" style={{borderLeftColor:CATEGORIES[evt.cat].color}}>
                    <div style={{fontSize:"17px",fontWeight:500,color:"#2a1e0e",marginBottom:evt.note?6:0}}>{evt.cat!=="legal"?expandAbbreviations(evt.name):evt.name}</div>
                    <div style={{fontSize:"12px",textTransform:"uppercase",letterSpacing:".1em",color:CATEGORIES[evt.cat].color,marginBottom:evt.note?6:0}}>{CATEGORIES[evt.cat].label}</div>
                    {evt.note && <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"14px",fontStyle:"italic",color:"#7a6a4a"}}>{evt.note}</div>}
                  </div>
                )) : (
                  <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"15px",color:"#9a8a6a",fontStyle:"italic"}}>{calMode==="ecclesiastical"?"No recorded feasts for this day.":"No legal dates for this day."}</div>
                )}
              </div>
            )}
          </div>
        )}

        <div style={{marginTop:48,paddingTop:24,borderTop:"1px solid #d4c5a0",fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"13px",color:"#9a8a6a",lineHeight:1.8}}>
          <div>The computus uses the Julian algorithm for years up to 1752, and the Gregorian algorithm thereafter.</div>
          {calMode==="ecclesiastical" ? (
            <div style={{marginTop:6}}>Saints' days follow C.R. Cheney & M. Jones, <em>Handbook of Dates</em> (Cambridge, 2000), pp. 64-92.</div>
          ) : (
            <div style={{marginTop:6}}>Law terms and return days follow C.R. Cheney & M. Jones, <em>Handbook of Dates</em> (Cambridge, 2000), pp. 98-101.</div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(Calendarium), document.getElementById("root"));
</script></body></html>
