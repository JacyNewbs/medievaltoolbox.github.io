<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medieval Toolbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: #8b6914; color: #fff; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #f5ead0;
      color: #3a2e1e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      text-align: center;
      max-width: 360px;
      width: 100%;
      padding: 0 24px;
    }
    .login-box .rule {
      width: 40px;
      height: 1px;
      background: #c4b48a;
      margin: 0 auto 24px;
    }
    .login-box h1 {
      font-size: 36px;
      font-weight: 300;
      color: #2a1e0e;
      letter-spacing: 0.03em;
      margin: 0 0 6px;
    }
    .login-box .sub {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 14px;
      color: #7a6a4a;
      font-style: italic;
      margin-bottom: 36px;
    }
    .login-box input {
      width: 100%;
      background: #fff8eb;
      border: 1px solid #c4b48a;
      color: #3a2e1e;
      padding: 12px 16px;
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 16px;
      border-radius: 3px;
      outline: none;
      text-align: center;
      letter-spacing: 0.05em;
      transition: border-color 0.3s;
    }
    .login-box input:focus {
      border-color: #7a5c14;
    }
    .login-box input::placeholder {
      color: #a0906a;
    }
    .login-box button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #7a5c14;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover {
      background: #5a4410;
    }
    .login-box .error {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 14px;
      color: #8b2020;
      margin-top: 12px;
      min-height: 20px;
    }
    .login-box .tag {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #7a5c14;
      margin-bottom: 14px;
      font-weight: 600;
    }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"><link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"><link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png"><link rel="manifest" href="site.webmanifest">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5MHHVQF35D"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5MHHVQF35D');
  </script>
</head>
<body>
  <div class="login-box">
    <div class="tag">Digital Tools for Medievalists</div>
    <h1>Medieval Toolbox</h1>
    <div class="sub">Enter the password to continue</div>
    <form id="login-form">
      <input type="password" id="pw" placeholder="Password" autofocus />
      <button type="submit">Enter</button>
    </form>
    <div class="error" id="err"></div>
  </div>

  <script>
    // SHA-256 hash of the password
    var HASH = "8ea752113563c9bbbcc7627e33051535919069af0999cb3ba4291ef055f1d38f";

    // If already authenticated, go straight to index
    if (sessionStorage.getItem("tk_auth") === HASH) {
      window.location.href = "index.html";
    }

    async function sha256(str) {
      var buf = new TextEncoder().encode(str);
      var hashBuf = await crypto.subtle.digest("SHA-256", buf);
      var arr = Array.from(new Uint8Array(hashBuf));
      return arr.map(function(b) { return b.toString(16).padStart(2, "0"); }).join("");
    }

    document.getElementById("login-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      var pw = document.getElementById("pw").value;
      var hash = await sha256(pw);
      if (hash === HASH) {
        sessionStorage.setItem("tk_auth", HASH);
        window.location.href = "index.html";
      } else {
        document.getElementById("err").textContent = "Incorrect password";
        document.getElementById("pw").value = "";
        document.getElementById("pw").focus();
      }
    });
  </script>
</body>
</html>
