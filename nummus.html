const DENOMINATIONS = [

  { name: "Crown", abbr: "cor.", pence: 60, note: "5s; from 1526" },

const SYSTEMS = {
  "linear":{name:"Linear",base:"inch",units:[{n:"Inch",v:1},{n:"Palm",v:3},{n:"Gunters Link",v:7.92},{n:"Span",v:9},{n:"Foot",v:12},{n:"Cubit",v:18},{n:"Yard",v:36},{n:"Pace",v:60},{n:"Fathom",v:72},{n:"Pole / Perch",v:198},{n:"Gunters Chain",v:792},{n:"Furlong",v:7920},{n:"Mile",v:63360}]},
  "area":{name:"Area",base:"square inch",units:[{n:"Square Inch",v:1},{n:"Square Gunters Link",v:62.726},{n:"Square Foot",v:144},{n:"Square Yard",v:1296},{n:"Square Pace",v:3600},{n:"Square Pole / Perch",v:39204},{n:"Square Gunters Chain",v:627264},{n:"Rood",v:1568160},{n:"Acre",v:6272640},{n:"Oxgang / Bovate",v:94089600},{n:"Virgate",v:188179200},{n:"Carucate / Hide",v:752716800}]},
  "cap_wine":{name:"Wine",base:"cubic_inch",units:[{n:"Cubic Inch",v:1},{n:"Pint",v:28.875},{n:"Quart",v:57.75},{n:"Gallon",v:231},{n:"Rundlet",v:4158},{n:"Barrel",v:7276.5},{n:"Tierce",v:9702},{n:"Hogshead",v:14553},{n:"Puncheon",v:19279},{n:"Butt",v:29106},{n:"Tun",v:58212}]},
  "cap_ale_before_1688":{name:"Malted Beverages - Ale (before 1688)",base:"cubic_inch",units:[{n:"Cubic Inch",v:1},{n:"Pint",v:35.25},{n:"Quart",v:70.5},{n:"Gallon",v:282},{n:"Barrel",v:9024},{n:"Hogshead",v:13536}]},
  "cap_ale_and_beer_1688_1803":{name:"Malted Beverages - Ale and Beer (1688-1803)",base:"cubic_inch",units:[{n:"Cubic Inch",v:1},{n:"Pint",v:35.25},{n:"Quart",v:70.5},{n:"Gallon",v:282},{n:"Barrel",v:9588},{n:"Hogshead",v:14382}]},
  "cap_beer_before_1688_and_ale_beer_1803_1824":{name:"Beer (before 1688) and Ale and Beer (1803-24)",base:"cubic_inch",units:[{n:"Cubic Inch",v:1},{n:"Pint",v:35.25},{n:"Quart",v:70.5},{n:"Gallon",v:282},{n:"Barrel",v:10152},{n:"Hogshead",v:15228}]},
  "cap_dry":{name:"Dry",base:"cubic_inch",units:[{n:"Cubic Inch",v:1},{n:"Pint",v:33.6},{n:"Quart",v:67.2},{n:"Gallon",v:268.8},{n:"Peck",v:537.6},{n:"Bushel",v:2150.42},{n:"Quarter",v:17203.36}]},
  "cap_coal":{name:"Coal (1421-1676)",base:"avoirdupois pound",units:[{n:"Avoirdupois Pound",v:1},{n:"Bushel",v:62.5},{n:"Chalder",v:2000},{n:"Keel",v:40000}]},
  "cap_cloth":{name:"Cloth",base:"inch",units:[{n:"Inch",v:1},{n:"Nail",v:2.25},{n:"Yard",v:36},{n:"Ell",v:45}]},
  "wt_tower":{name:"Tower",base:"troy_grain",units:[{n:"Troy Grain",v:1},{n:"Pennyweight",v:22.5},{n:"Ounce",v:450},{n:"Pound",v:5400}]},
  "wt_mercantile":{name:"Mercantile",base:"troy_grain",units:[{n:"Troy Grain",v:1},{n:"Pennyweight",v:22.5},{n:"Ounce",v:450},{n:"Pound",v:6750}]},
  "wt_troy":{name:"Troy",base:"troy_grain",units:[{n:"Troy Grain",v:1},{n:"Pennyweight",v:24},{n:"Ounce",v:480},{n:"Pound",v:5760}]},
  "wt_apothecary":{name:"Apothecary",base:"troy_grain",units:[{n:"Troy Grain",v:1},{n:"Scruple",v:20},{n:"Dram",v:60},{n:"Ounce",v:480},{n:"Pound",v:5760}]},
  "wt_avoirdupois":{name:"Avoirdupois",base:"troy_grain",units:[{n:"Troy Grain",v:1},{n:"Dram",v:27.344},{n:"Ounce",v:437.5},{n:"Pound",v:7000},{n:"Stone",v:98000},{n:"Hundredweight",v:784000},{n:"Ton",v:15680000}]},
  "wt_wool":{name:"Wool",base:"avoirdupois_pound",units:[{n:"Avoirdupois Pound",v:1},{n:"Clove / Nail",v:7},{n:"Stone",v:14},{n:"Tod",v:28},{n:"Wey",v:182},{n:"Sack",v:364},{n:"Sarpler",v:728},{n:"Last",v:4368}]},
  "wt_lead":{name:"Lead",base:"avoirdupois_pound",units:[{n:"Avoirdupois Pound",v:1},{n:"Stone",v:12.5},{n:"Fotmal",v:70},{n:"Wey",v:175},{n:"Fother",v:2100}]},
};

const GROUPS = [
  {key:"linear",label:"Linear",systems:["linear"]},
  {key:"area",label:"Area",systems:["area"]},
  {key:"capacity",label:"Capacity",systems:["cap_wine","cap_ale_before_1688","cap_dry","cap_coal","cap_cloth"]},
  {key:"weight",label:"Weight",systems:["wt_tower","wt_mercantile","wt_troy","wt_avoirdupois","wt_wool","wt_lead"]},
];

function penceTo_lsd(totalPence) {
  if (totalPence < 0) {
    var r = penceTo_lsd(-totalPence);
    return { li: -r.li, s: -r.s, d: -r.d, frac: r.frac, neg: true };
  }
  var wholePence = Math.floor(totalPence);
  var frac = totalPence - wholePence;
  var li = Math.floor(wholePence / 240);
  var rem = wholePence % 240;
  var s = Math.floor(rem / 12);
  var d = rem % 12;
  return { li: li, s: s, d: d, frac: frac, neg: false };
}

function formatLsd(obj) {
  var sign = obj.neg ? "-" : "";
  var fracStr = "";
  if (obj.frac === 0.5) fracStr = "\u00bd";
  else if (obj.frac === 0.25) fracStr = "\u00bc";
  else if (obj.frac === 0.75) fracStr = "\u00be";
  if (obj.li === 0 && obj.s === 0) return sign + obj.d + fracStr + "d.";
  if (obj.li === 0) return sign + obj.s + "s. " + obj.d + fracStr + "d.";
  return sign + obj.li + "li. " + obj.s + "s. " + obj.d + fracStr + "d.";
}

function parseLsd(li, s, d) {
  return (parseFloat(li) || 0) * 240 + (parseFloat(s) || 0) * 12 + (parseFloat(d) || 0);
}

function formatNum(n) {
  if (n === 0) return "0";
  if (n === Math.floor(n)) return n.toLocaleString();
  if (Math.abs(n - Math.round(n * 4) / 4) < 0.001) {
    var whole = Math.floor(n);
    var frac = n - whole;
    if (Math.abs(frac - 0.25) < 0.01) return (whole > 0 ? whole : "") + "\u00bc";
    if (Math.abs(frac - 0.5) < 0.01) return (whole > 0 ? whole : "") + "\u00bd";
    if (Math.abs(frac - 0.75) < 0.01) return (whole > 0 ? whole : "") + "\u00be";
  }
  if (Math.abs(n - Math.round(n * 3) / 3) < 0.001) {
    var whole2 = Math.floor(n);
    var frac2 = n - whole2;
    if (Math.abs(frac2 - 1/3) < 0.01) return (whole2 > 0 ? whole2 : "") + "\u2153";
    if (Math.abs(frac2 - 2/3) < 0.01) return (whole2 > 0 ? whole2 : "") + "\u2154";
  }
  return n.toFixed(4).replace(/0+$/, "").replace(/\.$/, "");
}

function Nummus() {
  const [mode, setMode] = useState("calculator");
  const [rows, setRows] = useState([
    { li: "", s: "", d: "", op: "+" },
    { li: "", s: "", d: "", op: "+" },
  ]);
  const [denomAmount, setDenomAmount] = useState("1");
  const [denomFrom, setDenomFrom] = useState(0);
  const [measGroup, setMeasGroup] = useState("linear");
  const [measSys, setMeasSys] = useState("linear");
  const [measAmount, setMeasAmount] = useState("1");
  const [measFrom, setMeasFrom] = useState(0);

  const currentGroup = GROUPS.find(g => g.key === measGroup);
  const currentSys = SYSTEMS[measSys];

  function switchGroup(gk) {
    setMeasGroup(gk);
    var grp = GROUPS.find(g => g.key === gk);
    setMeasSys(grp.systems[0]);
    setMeasFrom(0);
    setMeasAmount("1");
  }

  function switchSys(sk) {
    setMeasSys(sk);
    setMeasFrom(0);
    setMeasAmount("1");
  }

  const calcTotalPence = useMemo(() => {
    var total = 0;
    for (var i = 0; i < rows.length; i++) {
      var pence = parseLsd(rows[i].li, rows[i].s, rows[i].d);
      if (rows[i].op === "+") total += pence; else total -= pence;
    }
    return total;
  }, [rows]);

  const calcResult = useMemo(() => penceTo_lsd(calcTotalPence), [calcTotalPence]);

  const denomResults = useMemo(() => {
    var amt = parseFloat(denomAmount) || 0;
    var fromPence = DENOMINATIONS[denomFrom].pence * amt;
    return DENOMINATIONS.map(d => ({ name: d.name, abbr: d.abbr, value: fromPence / d.pence, note: d.note }));
  }, [denomAmount, denomFrom]);

  const measResults = useMemo(() => {
    if (!currentSys) return [];
    var amt = parseFloat(measAmount) || 0;
    var fromBase = currentSys.units[measFrom].v * amt;
    return currentSys.units.map(u => ({ name: u.n, value: fromBase / u.v }));
  }, [measAmount, measFrom, currentSys]);

  function updateRow(idx, field, value) {
    setRows(rows.map((r, i) => i === idx ? Object.assign({}, r, {[field]: value}) : r));
  }
  function addRow() { setRows(rows.concat([{ li: "", s: "", d: "", op: "+" }])); }
  function removeRow(idx) { if (rows.length > 2) setRows(rows.filter((_, i) => i !== idx)); }
  function clearCalc() { setRows([{ li: "", s: "", d: "", op: "+" }, { li: "", s: "", d: "", op: "+" }]); }

  return (
    <div style={{minHeight:"100vh",background:"#f5ead0",fontFamily:"'Cormorant Garamond',Georgia,serif",color:"#3a2e1e"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');
        *{box-sizing:border-box}::selection{background:#8b6914;color:#fff}
        .tk-nav{display:flex;justify-content:center;gap:0;background:#ede0c4;border-bottom:1px solid #d4c5a0;padding:0;flex-wrap:wrap}
        .tk-nav a{display:block;padding:10px 20px;font-family:'Crimson Pro',Georgia,serif;font-size:13px;color:#7a6a4a;text-decoration:none;letter-spacing:.04em;transition:all .2s;border-bottom:2px solid transparent}
        .tk-nav a:hover{color:#3a2e1e;background:rgba(122,92,20,.06)}
        .tk-nav a.active{color:#2a1e0e;border-bottom-color:#7a5c14;font-weight:600}
        .inp{background:#fff8eb;border:1px solid #c4b48a;color:#3a2e1e;padding:8px 10px;font-family:'Crimson Pro',Georgia,serif;font-size:16px;border-radius:3px;outline:none;text-align:center;transition:border-color .3s;width:72px}
        .inp:focus{border-color:#7a5c14}
        .inp-w{width:100px}
        .sel{background:#fff8eb;border:1px solid #c4b48a;color:#3a2e1e;padding:8px 12px;font-family:'Crimson Pro',Georgia,serif;font-size:15px;border-radius:3px;outline:none;cursor:pointer;transition:border-color .3s}
        .sel:focus{border-color:#7a5c14}
        .btn{background:none;border:1px solid #c4b48a;color:#7a6a4a;padding:6px 16px;font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;font-weight:600;cursor:pointer;border-radius:3px;transition:all .2s;letter-spacing:.04em}
        .btn:hover{border-color:#7a5c14;color:#3a2e1e;background:rgba(122,92,20,.06)}
        .btn-sm{padding:4px 10px;font-size:13px}
        .op-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;padding:0}
        .mt{display:flex;gap:0;margin-bottom:24px;justify-content:center;flex-wrap:wrap}
        .mt-btn{padding:10px 24px;font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;font-weight:600;letter-spacing:.06em;border:1px solid #c4b48a;cursor:pointer;transition:all .3s;background:transparent;color:#7a6a4a}
        .mt-btn:first-child{border-radius:3px 0 0 3px}
        .mt-btn:last-child{border-radius:0 3px 3px 0}
        .mt-btn+.mt-btn{border-left:none}
        .mt-btn.on{background:#7a5c14;color:#fff;border-color:#7a5c14}
        .mt-btn:not(.on):hover{color:#3a2e1e;background:rgba(122,92,20,.06)}
        .sub-mt{display:flex;gap:0;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
        .sub-btn{padding:6px 18px;font-family:'Crimson Pro',Georgia,serif;font-size:13px;border:1px solid #c4b48a;cursor:pointer;transition:all .2s;background:transparent;color:#7a6a4a}
        .sub-btn:first-child{border-radius:3px 0 0 3px}
        .sub-btn:last-child{border-radius:0 3px 3px 0}
        .sub-btn+.sub-btn{border-left:none}
        .sub-btn.on{background:#9a6a10;color:#fff;border-color:#9a6a10}
        .sys-btn{padding:5px 14px;font-family:'Crimson Pro',Georgia,serif;font-size:12px;border:1px solid #d4c5a0;cursor:pointer;transition:all .2s;background:transparent;color:#7a6a4a;border-radius:3px;margin:0 3px 6px}
        .sys-btn.on{background:#7a5c14;color:#fff;border-color:#7a5c14}
        .sys-btn:not(.on):hover{border-color:#7a5c14;color:#3a2e1e}
        .result-box{background:#ede0c4;border:1px solid #d4c5a0;border-radius:3px;padding:16px 20px;text-align:center;margin-top:16px}
        .result-val{font-size:28px;font-weight:500;color:#2a1e0e;letter-spacing:.02em}
        .result-sub{font-family:'Crimson Pro',Georgia,serif;font-size:14px;color:#7a6a4a;margin-top:4px}
        .ref-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #e8dbc0;font-family:'Crimson Pro',Georgia,serif;font-size:15px;transition:background .15s}
        .ref-row:last-child{border-bottom:none}
        .ref-row:hover{background:rgba(122,92,20,.04)}
        .ref-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;font-weight:600;color:#2a1e0e;min-width:130px}
        .ref-abbr{color:#7a5c14;min-width:70px;font-size:14px}
        .ref-val{color:#3a2e1e;font-weight:500;min-width:80px;text-align:right}
        .ref-note{color:#9a8a6a;font-size:13px;font-style:italic;flex:1}
        .row-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;justify-content:center;animation:fi .2s ease}
        .lbl{font-family:'Crimson Pro',Georgia,serif;font-size:14px;color:#7a6a4a;min-width:20px;text-align:center}
        .x-btn{background:none;border:none;color:#c4b48a;font-size:18px;cursor:pointer;padding:2px 6px;transition:color .2s}
        .x-btn:hover{color:#8b2020}
        @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:500px){.inp{width:56px;font-size:14px;padding:6px}.ref-row{flex-wrap:wrap;gap:6px}.ref-name{min-width:auto}}
      `}</style>

      <nav className="tk-nav">
        <a href="anno-regni.html">Anno Regni</a>
        <a href="calendarium.html">Calendarium</a>
        <a href="carta-maneriorum.html">Carta Maneriorum</a>
        <a href="locus-placenames.html">Locus</a>
        <a href="nummus.html" className="active">Nummus</a>
      </nav>

      <div style={{borderBottom:"1px solid #d4c5a0",padding:"40px 24px 32px",textAlign:"center",background:"linear-gradient(180deg,#ede0c4,#f5ead0)"}}>
        <div style={{fontSize:"11px",textTransform:"uppercase",letterSpacing:".35em",color:"#7a5c14",marginBottom:"12px",fontWeight:600}}>Currency & Measures</div>
        <h1 style={{fontSize:"clamp(28px,5vw,42px)",fontWeight:300,color:"#2a1e0e",margin:"0 0 8px",letterSpacing:".02em",lineHeight:1.2}}>Nummus</h1>
        <p style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"16px",color:"#7a6a4a",margin:0,fontStyle:"italic"}}>Medieval English currency, weights, and measures</p>
      </div>

      <div style={{maxWidth:680,margin:"0 auto",padding:"28px 16px 60px"}}>

        <div className="mt">
          <button className={"mt-btn"+(mode==="calculator"?" on":"")} onClick={()=>setMode("calculator")}>Calculator</button>
          <button className={"mt-btn"+(mode==="denominations"?" on":"")} onClick={()=>setMode("denominations")}>Denominations</button>
          <button className={"mt-btn"+(mode==="measures"?" on":"")} onClick={()=>setMode("measures")}>Measures</button>
        </div>

        {mode==="calculator" && (
          <div style={{animation:"fi .3s ease"}}>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"14px",color:"#7a6a4a",textAlign:"center",marginBottom:20}}>Add or subtract amounts in pounds, shillings, and pence</div>
            <div style={{display:"flex",justifyContent:"center",gap:40,marginBottom:12}}>
              <div className="lbl" style={{width:72,fontWeight:600}}>li.</div>
              <div className="lbl" style={{width:72,fontWeight:600}}>s.</div>
              <div className="lbl" style={{width:72,fontWeight:600}}>d.</div>
              <div style={{width:36}}></div>
            </div>
            {rows.map((row, i) => (
              <div key={i} className="row-wrap">
                <button className="op-btn btn" onClick={()=>updateRow(i,"op",row.op==="+"?"-":"+")}>{row.op}</button>
                <input className="inp" type="number" min="0" placeholder="0" value={row.li} onChange={e=>updateRow(i,"li",e.target.value)} />
                <input className="inp" type="number" min="0" placeholder="0" value={row.s} onChange={e=>updateRow(i,"s",e.target.value)} />
                <input className="inp" type="number" min="0" placeholder="0" value={row.d} onChange={e=>updateRow(i,"d",e.target.value)} />
                <button className="x-btn" onClick={()=>removeRow(i)}>{rows.length > 2 ? "\u00d7" : ""}</button>

              <button className="btn btn-sm" onClick={clearCalc}>Clear</button>
            </div>
            <div className="result-box">
              <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"12px",textTransform:"uppercase",letterSpacing:".15em",color:"#7a5c14",marginBottom:6}}>Total</div>
              <div className="result-val">{formatLsd(calcResult)}</div>
              <div className="result-sub">{calcTotalPence} pence{calcTotalPence !== 0 ? " = " + formatNum(calcTotalPence / 160) + " marks" : ""}</div>
            </div>
          </div>
        )}

        {mode==="denominations" && (
          <div style={{animation:"fi .3s ease"}}>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"14px",color:"#7a6a4a",textAlign:"center",marginBottom:20}}>Convert between medieval English denominations</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>
              <input className="inp inp-w" type="number" min="0" step="any" value={denomAmount} onChange={e=>setDenomAmount(e.target.value)} />
              <select className="sel" value={denomFrom} onChange={e=>setDenomFrom(parseInt(e.target.value))}>
                {DENOMINATIONS.map((d,i) => (<option key={i} value={i}>{d.name}</option>))}
              </select>
              <span style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"15px",color:"#7a6a4a"}}>=</span>
            </div>
            <div style={{background:"#faf3e3",border:"1px solid #d4c5a0",borderRadius:3,overflow:"hidden"}}>
              {denomResults.map((r, i) => (
                <div key={i} className="ref-row" style={{background:i===denomFrom?"#ede0c4":undefined}}>
                  <div className="ref-name">{r.name}</div>
                  <div className="ref-abbr">{r.abbr}</div>
                  <div className="ref-val">{formatNum(r.value)}</div>
                  <div className="ref-note">{r.note}</div>
                </div>
              ))}
            </div>
            <div className="result-box" style={{marginTop:20}}>
              <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"12px",textTransform:"uppercase",letterSpacing:".15em",color:"#7a5c14",marginBottom:6}}>In pounds, shillings, and pence</div>
              <div className="result-val">{formatLsd(penceTo_lsd(DENOMINATIONS[denomFrom].pence * (parseFloat(denomAmount)||0)))}</div>
            </div>
          </div>
        )}

        {mode==="measures" && (
          <div style={{animation:"fi .3s ease"}}>
            <div className="sub-mt">
              {GROUPS.map(g => (
                <button key={g.key} className={"sub-btn"+(measGroup===g.key?" on":"")} onClick={()=>switchGroup(g.key)}>{g.label}</button>
              ))}
            </div>

            {currentGroup && currentGroup.systems.length > 1 && (
              <div style={{textAlign:"center",marginBottom:16}}>
                {currentGroup.systems.map(sk => (
                  <button key={sk} className={"sys-btn"+(measSys===sk?" on":"")} onClick={()=>switchSys(sk)}>{SYSTEMS[sk].name}</button>
                ))}
              </div>
            )}

            {currentSys && (
              <div>
                <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"13px",color:"#9a8a6a",textAlign:"center",marginBottom:16,fontStyle:"italic"}}>Base unit: {currentSys.base}</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>
                  <input className="inp inp-w" type="number" min="0" step="any" value={measAmount} onChange={e=>setMeasAmount(e.target.value)} />
                  <select className="sel" value={measFrom} onChange={e=>setMeasFrom(parseInt(e.target.value))}>
                    {currentSys.units.map((u,i) => (<option key={i} value={i}>{u.n}</option>))}
                  </select>
                  <span style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"15px",color:"#7a6a4a"}}>=</span>
                </div>
                <div style={{background:"#faf3e3",border:"1px solid #d4c5a0",borderRadius:3,overflow:"hidden"}}>
                  {measResults.map((r, i) => (
                    <div key={i} className="ref-row" style={{background:i===measFrom?"#ede0c4":undefined}}>
                      <div className="ref-name">{r.name}</div>
                      <div className="ref-val">{formatNum(r.value)}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        <div style={{marginTop:48,paddingTop:24,borderTop:"1px solid #d4c5a0",fontFamily:"'Crimson Pro',Georgia,serif",fontSize:"13px",color:"#9a8a6a",lineHeight:1.8}}>
          <div>The calculator handles pounds, shillings, and pence arithmetic with automatic carrying (12d. = 1s., 20s. = 1li.).</div>
          <div style={{marginTop:6}}>Weights and measures after R.E. Zupko, <em>British Weights and Measures: A History from Antiquity to the Seventeenth Century</em> (Madison: The University of Wisconsin Press, 1977).</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(Nummus), document.getElementById("root"));
</script></body></html>
