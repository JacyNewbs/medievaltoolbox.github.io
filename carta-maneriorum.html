*{box-sizing:border-box;margin:0;padding:0}
::selection{background:#8b6914;color:#fff}
body{font-family:'Cormorant Garamond','EB Garamond',Georgia,serif;background:#f5ead0;color:#3a2e1e;height:100vh;display:flex;flex-direction:column}
#header{background:linear-gradient(180deg,#ede0c4,#f5ead0);border-bottom:1px solid #d4c5a0;padding:16px 24px 12px;text-align:center;flex-shrink:0}
#header .tag{font-size:10px;text-transform:uppercase;letter-spacing:.35em;color:#7a5c14;margin-bottom:6px;font-weight:600}
#header h1{font-size:26px;font-weight:300;color:#2a1e0e;letter-spacing:.02em;margin:0 0 4px}
#header .sub{font-family:'Crimson Pro',Georgia,serif;font-size:13px;color:#7a6a4a;font-style:italic}
#controls{padding:10px 16px;background:#ede0c4;border-bottom:1px solid #d4c5a0;flex-shrink:0}
#row1{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
#search{flex:1;min-width:180px;background:#fff8eb;border:1px solid #c4b48a;color:#3a2e1e;padding:7px 12px;font-family:'Crimson Pro',Georgia,serif;font-size:14px;border-radius:3px;outline:none}
#search:focus{border-color:#7a5c14}#search::placeholder{color:#a0906a}
.yr-input{width:70px;background:#fff8eb;border:1px solid #c4b48a;color:#3a2e1e;padding:5px 8px;font-family:'Crimson Pro',Georgia,serif;font-size:14px;border-radius:3px;outline:none;text-align:center}
.yr-input:focus{border-color:#7a5c14}
.yr-label{font-family:'Crimson Pro',Georgia,serif;font-size:13px;color:#7a6a4a}
#row2{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.dt-btn{padding:3px 10px;font-family:'Crimson Pro',Georgia,serif;font-size:12px;border:1px solid #c4b48a;cursor:pointer;border-radius:3px;transition:all .2s;background:transparent;color:#7a6a4a}
.dt-btn:hover{border-color:#7a5c14;color:#3a2e1e}
.dt-btn.active{background:#7a5c14;color:#fff;border-color:#7a5c14}
#count{font-family:'Crimson Pro',Georgia,serif;font-size:12px;color:#9a8a6a;margin-left:auto;white-space:nowrap}
.earliest-btn{padding:5px 14px;font-family:'Cormorant Garamond',Georgia,serif;font-size:13px;font-weight:600;letter-spacing:.04em;border:1px solid #8b2020;cursor:pointer;border-radius:3px;transition:all .2s;background:transparent;color:#8b2020;text-transform:uppercase;white-space:nowrap}
.earliest-btn:hover{background:#8b2020;color:#fff}
.earliest-btn.active{background:#8b2020;color:#fff}
#main{flex:1;display:flex;position:relative;overflow:hidden}
#map{flex:1}
#panel{width:400px;background:#faf3e3;border-left:1px solid #d4c5a0;overflow-y:auto;flex-shrink:0;display:none;position:relative}
#panel.open{display:block}
#panel-close{position:absolute;top:8px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;color:#7a6a4a;z-index:5}
#panel-close:hover{color:#3a2e1e}
#pc{padding:20px}
.p-name{font-size:22px;font-weight:500;color:#2a1e0e;margin-bottom:2px;padding-right:30px}
.p-place{font-family:'Crimson Pro',Georgia,serif;font-size:15px;color:#7a6a4a;margin-bottom:12px}
.p-stat{font-family:'Crimson Pro',Georgia,serif;font-size:13px;color:#5a4a30;margin-bottom:16px;line-height:1.6}
.p-stat strong{color:#3a2e1e}
.doc-section{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:#7a5c14;font-weight:600;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #d4c5a0}
.doc-card{display:block;padding:10px 12px;border-left:3px solid #c4b48a;background:linear-gradient(135deg,#faf3e3,#f0e6cc);border-radius:0 3px 3px 0;margin-bottom:6px;cursor:pointer;transition:background .15s;text-decoration:none;color:inherit}
.doc-card:hover{background:linear-gradient(135deg,#f0e6cc,#e8dbc0)}
.doc-card.court{border-left-color:#8b2020}.doc-card.account{border-left-color:#3a7a3a}.doc-card.rental{border-left-color:#9a6a10}.doc-card.survey{border-left-color:#4a6a9a}.doc-card.map{border-left-color:#6a5ea0}
.doc-type{font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:2px}
.doc-type.court{color:#8b2020}.doc-type.account{color:#3a7a3a}.doc-type.rental{color:#9a6a10}.doc-type.survey{color:#4a6a9a}.doc-type.map{color:#6a5ea0}
.doc-dates{font-family:'Crimson Pro',Georgia,serif;font-size:14px;color:#3a2e1e;font-weight:500}
.doc-ref{font-family:'Crimson Pro',Georgia,serif;font-size:12px;color:#7a5c14;margin-top:2px;text-decoration:underline;text-decoration-color:#c4b48a;text-underline-offset:2px}
.doc-held{font-family:'Crimson Pro',Georgia,serif;font-size:11px;color:#9a8a6a}
.leaflet-popup-content-wrapper{border-radius:3px;font-family:'Crimson Pro',Georgia,serif;background:#faf3e3;color:#3a2e1e;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.leaflet-popup-tip{background:#faf3e3}
.leaflet-popup-content{margin:10px 14px;font-size:14px;line-height:1.5}
.pop-manor{font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;font-weight:600;color:#2a1e0e;cursor:pointer;margin-bottom:2px}
.pop-manor:hover{color:#7a5c14}
.pop-meta{font-size:12px;color:#7a6a4a}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(139,32,32,.2)}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:rgba(139,32,32,.65);color:#fff;font-family:'Crimson Pro',Georgia,serif;font-weight:600}
.leaflet-tile-pane{filter:contrast(1.15) saturate(1.3)}
.leaflet-control-zoom a{background:#faf3e3!important;color:#3a2e1e!important;border-color:#c4b48a!important}
@media(max-width:700px){#panel{width:100%;position:absolute;top:0;left:0;right:0;bottom:0;z-index:1000}#row1,#row2{flex-direction:column;align-items:stretch}#count{margin-left:0;margin-top:4px}}
.tk-nav{display:flex;justify-content:center;gap:0;background:#ede0c4;border-bottom:1px solid #d4c5a0;padding:0;flex-wrap:wrap;flex-shrink:0}
.tk-nav a{display:block;padding:10px 20px;font-family:'Crimson Pro',Georgia,serif;font-size:13px;color:#7a6a4a;text-decoration:none;letter-spacing:.04em;transition:all .2s;border-bottom:2px solid transparent}
.tk-nav a:hover{color:#3a2e1e;background:rgba(122,92,20,.06)}
.tk-nav a.active{color:#2a1e0e;border-bottom-color:#7a5c14;font-weight:600}

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
<script>
const TNA_BASE="https://discovery.nationalarchives.gov.uk/details/r/";
const DATA=JSON.parse(document.getElementById("manor-data").textContent);

function docClass(t){
  if(t.includes("court"))return "court";
  if(t.includes("account"))return "account";
  if(t.includes("rental"))return "rental";
  if(t.includes("survey"))return "survey";
  if(t.includes("map"))return "map";
  return "";
}

const allTypes=new Set();
DATA.forEach(m=>m[4].forEach(d=>allTypes.add(d[1])));
const typeArr=[...allTypes].sort();
const activeTypes=new Set(typeArr);

const row2=document.getElementById("row2");
const mainTypes=["court roll(s)","account(s)","rental(s)","survey(s)","map(s)","presentment(s)","custom(s)/custumal(s)"];
mainTypes.forEach(t=>{
  if(!allTypes.has(t))return;
  const btn=document.createElement("button");
  btn.className="dt-btn active";
  btn.textContent=t.replace("(s)","s").replace("(s)/custumal(s)","s");
  btn.onclick=()=>{
    if(activeTypes.has(t)){activeTypes.delete(t);btn.classList.remove("active")}
    else{activeTypes.add(t);btn.classList.add("active")}
    updateMap();
  };
  row2.insertBefore(btn,document.getElementById("count"));
});
const otherTypes=typeArr.filter(t=>!mainTypes.includes(t));
if(otherTypes.length){
  const btn=document.createElement("button");
  btn.className="dt-btn active";btn.textContent="other";btn._active=true;
  btn.onclick=()=>{
    btn._active=!btn._active;
    otherTypes.forEach(t=>{if(btn._active)activeTypes.add(t);else activeTypes.delete(t)});
    btn.classList.toggle("active",btn._active);updateMap();
  };
  row2.insertBefore(btn,document.getElementById("count"));
}

let map,cluster,manorMarkers=[],showEarliest=false,searchTerm="",yrFrom=0,yrTo=9999;

function init(){
  map=L.map("map",{zoomControl:true}).setView([50.75,-2.25],10);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{attribution:"&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> &copy; <a href='https://carto.com/'>CARTO</a>",maxZoom:19,subdomains:"abcd"}).addTo(map);
  cluster=L.markerClusterGroup({maxClusterRadius:35,spiderfyOnMaxZoom:true,showCoverageOnHover:false});

  const locMap={};
  DATA.forEach((m,i)=>{const key=m[2]+","+m[3];if(!locMap[key])locMap[key]={lat:m[2],lon:m[3],manors:[]};locMap[key].manors.push(i)});

  Object.values(locMap).forEach(loc=>{
    const icon=L.divIcon({className:"",html:"<div style=\"width:12px;height:12px;border-radius:50%;background:#8b2020;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)\"></div>",iconSize:[12,12],iconAnchor:[6,6]});
    const marker=L.marker([loc.lat,loc.lon],{icon});
    marker._manorIdxs=loc.manors;
    marker._searchStr=loc.manors.map(i=>DATA[i][0].toLowerCase()+" "+DATA[i][1].toLowerCase()).join(" ");
    marker.bindPopup(()=>{
      let html="";
      loc.manors.forEach(i=>{
        const m=DATA[i],fDocs=getFilteredDocs(m);
        if(fDocs.length===0)return;
        const earliest=fDocs.reduce((a,d)=>d[2]>0&&d[2]<a?d[2]:a,9999);
        html+="<div class=\"pop-manor\" onclick=\"showManor("+i+")\">"+m[0]+"</div>";
        html+="<div class=\"pop-meta\">"+fDocs.length+" doc"+(fDocs.length!==1?"s":"")+" &middot; earliest "+earliest+"</div>";
      });
      return html||"<div class=\"pop-meta\">No documents match current filters</div>";
    });
    manorMarkers.push(marker);
  });
  updateMap();
  document.getElementById("search").addEventListener("input",e=>{searchTerm=e.target.value.toLowerCase();updateMap()});
  document.getElementById("yr-from").addEventListener("change",e=>{yrFrom=parseInt(e.target.value)||0;updateMap()});
  document.getElementById("yr-to").addEventListener("change",e=>{yrTo=parseInt(e.target.value)||9999;updateMap()});
}

function getFilteredDocs(m){
  return m[4].filter(d=>{
    if(!activeTypes.has(d[1]))return false;
    if(d[2]>0&&d[2]>yrTo)return false;
    if(d[3]>0&&d[3]<yrFrom)return false;
    return true;
  });
}

function updateMap(){
  cluster.clearLayers();
  let docCount=0,manorCount=0;
  if(showEarliest){
    let allDocs=[];
    DATA.forEach((m,i)=>{getFilteredDocs(m).forEach(d=>{if(d[2]>0)allDocs.push({mi:i,d,sy:d[2]})})});
    allDocs.sort((a,b)=>a.sy-b.sy);
    const top50=allDocs.slice(0,50),topManors=new Set(top50.map(x=>x.mi));
    manorMarkers.forEach(marker=>{
      if(!marker._manorIdxs.some(i=>topManors.has(i)))return;
      if(searchTerm&&!marker._searchStr.includes(searchTerm))return;
      cluster.addLayer(marker);
      marker._manorIdxs.forEach(i=>{if(topManors.has(i))manorCount++});
    });
    docCount=top50.length;
  } else {
    manorMarkers.forEach(marker=>{
      if(searchTerm&&!marker._searchStr.includes(searchTerm))return;
      let hasDocs=false;
      marker._manorIdxs.forEach(i=>{const fDocs=getFilteredDocs(DATA[i]);if(fDocs.length>0){hasDocs=true;docCount+=fDocs.length;manorCount++}});
      if(hasDocs)cluster.addLayer(marker);
    });
  }
  map.addLayer(cluster);
  document.getElementById("count").textContent=docCount.toLocaleString()+" documents across "+manorCount+" manors";
}

function toggleEarliest(){
  showEarliest=!showEarliest;
  document.getElementById("earliest-btn").classList.toggle("active",showEarliest);
  updateMap();
}

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}

function showManor(i){
  const m=DATA[i],fDocs=getFilteredDocs(m);
  const earliest=fDocs.reduce((a,d)=>d[2]>0&&d[2]<a?d[2]:a,9999);
  const latest=fDocs.reduce((a,d)=>d[3]>a?d[3]:a,0);
  const typeCounts={};
  fDocs.forEach(d=>{typeCounts[d[1]]=(typeCounts[d[1]]||0)+1});
  let typeStr=Object.entries(typeCounts).map(([k,v])=>v+" "+k.replace("(s)","s")).join(", ");

  let docsHtml="";
  fDocs.forEach(d=>{
    const cls=docClass(d[1]);
    const url=TNA_BASE+d[6];
    docsHtml+="<a class=\"doc-card "+cls+"\" href=\""+url+"\" target=\"_blank\" rel=\"noopener\">"+
      "<div class=\"doc-type "+cls+"\">"+escHtml(d[1])+"</div>"+
      "<div class=\"doc-dates\">"+escHtml(d[4])+"</div>"+
      "<div class=\"doc-ref\">"+escHtml(d[0])+" &#8599;</div>"+
      "<div class=\"doc-held\">"+escHtml(d[5])+"</div>"+
    "</a>";
  });

  document.getElementById("pc").innerHTML=
    "<div class=\"p-name\">"+escHtml(m[0])+"</div>"+
    "<div class=\"p-place\">"+escHtml(m[1])+"</div>"+
    "<div class=\"p-stat\">"+
      "<strong>"+fDocs.length+"</strong> document"+(fDocs.length!==1?"s":"")+
      (earliest<9999?" &middot; earliest <strong>"+earliest+"</strong>":"")+
      (latest>0?" &middot; latest <strong>"+latest+"</strong>":"")+
      "<br>"+typeStr+
    "</div>"+
    "<div class=\"doc-section\">Documents <span style=\"font-weight:400;text-transform:none;letter-spacing:0;font-family:Crimson Pro,Georgia,serif;font-size:11px;color:#9a8a6a\">&mdash; click to open in TNA Discovery</span></div>"+docsHtml;

  document.getElementById("panel").classList.add("open");
  map.setView([m[2],m[3]],13);
}

function closePanel(){document.getElementById("panel").classList.remove("open")}
init();
</script></body></html>
